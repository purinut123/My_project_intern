<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PANELIST — Landing</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="auth.js"></script>
  <script src="search.js" defer></script>
</head>
<body class="theme-dark">

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="container header__row">
      <a class="brand" href="home.html">PANELIST</a>
      
      <div class="searchbar">
        <label class="select">
          <span class="sr-only">Filter</span>
          <select>
            <option>All</option>
            <option>Manga</option>
            <option>Manhwa</option>
            <option>Novel</option>
          </select>
        </label>
        <input class="searchbar__input" type="search" placeholder="Search…" />
        <button class="btn btn--ghost">Search</button>
      </div>

      <nav class="topnav">
        <a href="#">Book</a>
        <a href="#">Author</a>
        <a href="#">Publisher</a>
        <a href="#">Top Rated</a>
        <a href="contact.html">Contact Us</a>
      </nav>

      <nav class="usernav">
        <a href="login.html" class="link unauth-only">Login/Sign Up</a>
        <!-- Only visible when logged in -->
        <a href="profile.html" id="Profile" class="link auth-only">
          <img id="profileImage" class="usericon avatar" src="./image/default_pfp.svg" alt="profile" />
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== Main Layout ===== -->
  <main class="container search-wrap">
    <!-- Search bar -->
    <section class="search-hero" role="search">
      <div class="search-box">
        <div class="search-icon">
          <img class="icon" src="image/search.svg" alt="search" />
        </div>
        <input id="q" class="search-input" type="search" placeholder="Search by title, author, or tag…" />
      </div>

      <!-- Filters -->
      <div class="filters">
        <label class="filter">
          <span class="filter-label">Category</span>
          <select>
            <option>All</option>
            <option>Manga</option>
            <option>Manhwa</option>
            <option>Novel</option>
          </select>
        </label>

        <label class="filter">
          <span class="filter-label">Status</span>
          <select>
            <option>All</option>
            <option>Ongoing</option>
            <option>Hiatus</option>
            <option>Completed</option>
          </select>
        </label>

        <label class="filter">
          <span class="filter-label">Rating</span>
          <select>
            <option>All</option>
            <option>All ages</option>
            <option>Teen</option>
            <option>Mature</option>
          </select>
        </label>

        <label class="filter">
          <span class="filter-label">Sort by</span>
          <select>
            <option>Latest update</option>
            <option>Highest rating</option>
            <option>Most viewed</option>
            <option>A–Z</option>
          </select>
        </label>
      </div>
    </section>

    <!-- Results list -->
    <section class="results" aria-live="polite">
      <article class="result">
        <a class="cover block" href="detail.html"><div class="thumb">COVER</div></a>
        <div class="result-body">
          <h2 class="result-title"><a href="detail.html">Result title goes here…</a></h2>
          <p class="result-meta">author · genres · status</p>
          <p class="result-desc">Short description preview for two or three lines tops…</p>
          <div class="result-stats">
            <span class="chip">8.6K views</span>
            <span class="chip">39 comments</span>
          </div>
          <div class="result-tags">
            <a class="tag" href="#">#tag</a><a class="tag" href="#">#another</a>
          </div>
        </div>
      </article>
    </section>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <div class="container footer__row">
      <div class="social">
        <span>Follow Us</span>
        <nav>
          <a href="#" aria-label="Facebook">
            <img class="icon" src="image/facebook.svg" alt="facebook" />
          </a>
          <a href="#" aria-label="Instagram">
            <img class="icon" src="image/instagram.svg" alt="instagram" />
          </a>
          <a href="#" aria-label="X">
            <img class="icon" src="image/x.svg" alt="x" />
          </a>
          <a href="#" aria-label="Discord">
            <img class="icon" src="image/discord.svg" alt="discord" />
          </a>
        </nav>
      </div>
      <div class="footlinks">
        <a href="#">About</a>
        <a href="#">Help</a>
        <a href="#">Sitemap</a>
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
      </div>
    </div>
  </footer>

</body>
</html>
