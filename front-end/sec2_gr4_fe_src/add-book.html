<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PANELIST — Landing</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="auth.js"></script>
</head>
<body class="theme-dark">

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="container header__row">
      <a class="brand" href="home.html">PANELIST</a>
      
      <div class="searchbar">
        <label class="select">
          <span class="sr-only">Filter</span>
          <select>
            <option>All</option>
            <option>Manga</option>
            <option>Manhwa</option>
            <option>Novel</option>
            <option>Author</option>
            <option>Publisher</option>
          </select>
        </label>
        <input class="searchbar__input" type="search" placeholder="Search…" />
        <button class="btn btn--ghost">Search</button>
      </div>

      <nav class="topnav">
        <a href="#">Book</a>
        <a href="#">Author</a>
        <a href="#">Publisher</a>
        <a href="#">Top Rated</a>
        <a href="contact.html">Contact Us</a>
      </nav>

      <nav class="usernav">
        <a href="login.html" class="link unauth-only">Login/Sign Up</a>
        <!-- Only visible when logged in -->
        <a href="profile.html" id="Profile" class="link auth-only">
          <img id="profileImage" class="usericon avatar" src="./image/default_pfp.svg" alt="profile" />
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== Main Layout ===== -->
  <main class="container form-wrap">
    <header class="form-head">
      <h1 id="formTitle">Add New Book</h1>
      <p class="muted">* required</p>
    </header>

    <form id="book-form" class="form">
      <!-- left: cover -->
      <section class="card media">
        <div class="cover-drop">
          <div class="cover thumb" id="coverPreview">COVER</div>
          <input name="coverUrl" class="input" type="url" placeholder="Cover image URL" />
        </div>
        <div class="actions">
          <button type="submit" class="btn btn--ghost">Save</button>
          <a href="profile.html" class="btn btn--danger" id="btnCancel">Cancel</a>
        </div>
        <span id="book-form-status" class="muted"></span>
      </section>

      <!-- right: fields -->
      <section class="card fields">
        <div class="grid two">
          <label class="field">
            <span class="label">Title *</span>
            <input name="title" class="input" type="text" placeholder="Book title" required />
          </label>
          <label class="field">
            <span class="label">Original Title</span>
            <input name="og_title" class="input" type="text" placeholder="Original title" />
          </label>
        </div>

        <div class="grid two">
          <label class="field">
            <span class="label">Author *</span>
            <input name="author" class="input" type="text" placeholder="Author name" required />
          </label>

          <label class="field">
            <span class="label">Publisher *</span>
            <input name="publisher" class="input" type="text" placeholder="Publisher name" required />
          </label>
        </div>

        <div class="grid three">
          <label class="field">
            <span class="label">Book type *</span>
            <select name="type" class="select" required>
              <option value="">Select…</option>
              <option>manga</option>
              <option>manhwa</option>
              <option>novel</option>
            </select>
          </label>

          <label class="field">
            <span class="label">Status *</span>
            <select name="status" class="select" required>
              <option value="">Select…</option>
              <option>ongoing</option>
              <option>completed</option>
              <option>hiatus</option>
            </select>
          </label>

          <label class="field">
            <span class="label">Content rating *</span>
            <select name="content_rating" class="select" required>
              <option value="">Select…</option>
              <option value="all-ages">All ages</option>
              <option value="Teen">13+ / Teen</option>
              <option value="Mature">18+ / Mature</option>
            </select>
          </label>
        </div>
        
        <div class="grid two">
          <label class="field">
            <span class="label">Genres *</span>
            <input name="genres" class="input" type="text" placeholder="fantasy, action, drama" required />
          </label>
          
          <label class="field">
            <span class="label">Release Year</span>
            <input name="release_year" class="input" type="text" placeholder="e.g., 2021" />
          </label>
        </div>

        <label class="field">
          <span class="label">Read platform</span>
          <input name="platforms" class="input" type="text" placeholder="Licensed platforms where the book is available" />
        </label>

        <label class="field">
          <span class="label">Synopsis</span>
          <textarea name="synopsis" class="textarea" rows="6" placeholder="Short summary…"></textarea>
        </label>
      </section>
    </form>
  </main>

  <!-- ===== Script to handle form submission ===== -->
  <script>
    const form = document.getElementById('book-form');
    const statusEl = document.getElementById('book-form-status');
    const coverPreview = document.getElementById('coverPreview');
    const coverUrlInput = form.coverUrl;

    // Preview book cover as user enters URL
    coverUrlInput.addEventListener('input', (e) => {
      const url = e.target.value.trim();
      if (url) {
        coverPreview.style.backgroundImage = `url('${url}')`;
        coverPreview.style.backgroundSize = 'cover';
        coverPreview.style.backgroundPosition = 'center';
        coverPreview.textContent = ''; // Clear "COVER" text
      } else {
        coverPreview.style.backgroundImage = 'none';
        coverPreview.textContent = 'COVER'; // Show default text
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // stop page reload

      // 🔴 if form is not valid, show browser warning and STOP
      if (!form.checkValidity()) {
        form.reportValidity(); 
        return;
      }

      const data = {
        title: form.title.value,
        og_title: form.og_title.value || null,
        type: form.type.value,
        genres: form.genres.value,
        synopsis: form.synopsis.value,
        release_year: form.release_year.value || null,
        read_platform: form.platforms.value,
        rating: form.content_rating.value,
        status: form.status.value,
        authorName: form.author.value,
        publisherName: form.publisher.value,
        coverUrl: form.coverUrl.value || null
      };

      statusEl.textContent = 'Saving...';

      try {
        const res = await fetch('/api/books-add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          statusEl.textContent = 'Error saving book.';
          console.error(result);
          return;
        }

        statusEl.textContent = 'Book saved! ID: ' + result.bookId;
        form.reset();
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Server error.';
      }
    });
  </script>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <div class="container footer__row">
      <div class="social">
        <span>Follow Us</span>
        <nav>
          <a href="#" aria-label="Facebook">
            <img class="icon" src="image/facebook.svg" alt="facebook" />
          </a>
          <a href="#" aria-label="Instagram">
            <img class="icon" src="image/instagram.svg" alt="instagram" />
          </a>
          <a href="#" aria-label="X">
            <img class="icon" src="image/x.svg" alt="x" />
          </a>
          <a href="#" aria-label="Discord">
            <img class="icon" src="image/discord.svg" alt="discord" />
          </a>
        </nav>
      </div>
      <div class="footlinks">
        <a href="#">About</a>
        <a href="#">Help</a>
        <a href="#">Sitemap</a>
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
      </div>
    </div>
  </footer>

</body>
</html>
